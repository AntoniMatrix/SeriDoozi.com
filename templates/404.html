<!doctype html>
{% load static %}
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>صفحه یافت نشد - 404 | {{ SITE_NAME }}</title>

    <link rel="icon" type="image/png" href="{% static 'img/LOGO.png' %}" />
    <meta
      name="description"
      content="{% block meta_description %}404 Not Found Page{% endblock %}"
    />
    <meta
      name="robots"
      content="{% block meta_robots %}index,follow{% endblock %}"
    />
    <link
      rel="canonical"
      href="{% block canonical %}{{ CURRENT_URL }}{% endblock %}"
    />

    <style>
      :root {
        --bg: #0b0f14;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background:
          radial-gradient(
            1200px 600px at 20% -10%,
            rgba(243, 156, 61, 0.18),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 80% 0%,
            rgba(66, 135, 245, 0.14),
            transparent 55%
          ),
          var(--bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      .error-code {
        font-size: 8rem;
        font-weight: bold;
        margin-bottom: 1rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }
      .error-message {
        font-size: 1.5rem;
        margin-bottom: 2rem;
      }
      .home-link {
        display: inline-block;
        padding: 1rem 2rem;
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid #fff;
        border-radius: 50px;
        color: #fff;
        text-decoration: none;
        font-size: 1.1rem;
        transition: all 0.3s ease;
      }
      .home-link:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <div class="error-message">صفحه مورد نظر یافت نشد</div>
      <a href="/" class="home-link">بازگشت به صفحه اصلی</a>
    </div>
  </body>
</html>
